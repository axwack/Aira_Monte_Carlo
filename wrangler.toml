name                  = "aira-monte-carlo"
compatibility_date    = "2024-09-23"
pages_build_output_dir = "build"

[[d1_databases]]
binding       = "DB"
database_name = "aira-credits"
database_id   = "REPLACE_WITH_OUTPUT_OF: wrangler d1 create aira-credits"

# ─── Required environment variables ──────────────────────────────────────────
# Set these in Cloudflare Dashboard → Pages → Project → Settings → Environment Variables
# (never commit real values here)
#
#   STRIPE_SECRET_KEY      sk_live_...  or  sk_test_...
#   STRIPE_WEBHOOK_SECRET  whsec_...  (Cloudflare Pages URL → Stripe Dashboard → Webhooks)
#   STRIPE_PRICE_STARTER   price_...  (create in Stripe Dashboard: $5.10 one-time)
#   STRIPE_PRICE_PRO       price_...  (create in Stripe Dashboard: $15.00 one-time)
#   GEMINI_API_KEY         AIza...    (YOUR server-side key — users don't need their own)
#   JWT_SECRET             32+ random bytes: openssl rand -hex 32

# ─── Setup checklist ─────────────────────────────────────────────────────────
# 1. wrangler d1 create aira-credits               → paste database_id above
# 2. wrangler d1 execute aira-credits \
#      --file=db/schema.sql --remote               → create tables
# 3. Create products + prices in Stripe Dashboard  → paste price IDs in env vars
# 4. Add webhook in Stripe: POST <pages-url>/api/webhook
#    Events: checkout.session.completed
# 5. Set all env vars in Cloudflare Dashboard
# 6. Flip BILLING_ENABLED = true in src/ai/ai-analysis.js
