# ─── AiRA Monte Carlo — Netlify config ───────────────────────────────────────
# ROLE: Staging / backup mirror only.
# PRIMARY deploy is Cloudflare Pages (manual, wrangler.toml).
# Netlify auto-deploys from main for QA previews.
# Billing (/api/*) does NOT work here — Cloudflare D1 is unavailable.
# AI works in BYOK mode (user's own Gemini key).
#
# To stop Netlify auto-publishing:
#   Netlify Dashboard → Site → Site configuration → Build & deploy
#   → Continuous deployment → Stop auto publishing
# ─────────────────────────────────────────────────────────────────────────────

[build]
  command   = "npm run build"
  publish   = "build"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION             = "18"
  NPM_VERSION              = "10"
  GENERATE_SOURCEMAP       = "false"
  CI                       = "false"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  REACT_APP_ENV            = "staging"

[functions]
  node_bundler = "esbuild"

# Serve the SPA for all routes
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
